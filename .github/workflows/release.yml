name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify release version
        run: bash .github/scripts/verify-release-version.sh

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runtime/go.sum

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        run: make install

      - name: Build macOS arm64 (ad-hoc signing)
        env:
          APPLE_SIGNING_IDENTITY: "-"
          SKIP_ICONS: "1"
        run: make build-macos

      - uses: actions/upload-artifact@v5
        with:
          name: macos-arm64
          path: app/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-macos-x64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify release version
        run: bash .github/scripts/verify-release-version.sh

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runtime/go.sum

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        run: make install

      - name: Build macOS x64 (ad-hoc signing)
        env:
          APPLE_SIGNING_IDENTITY: "-"
          SKIP_ICONS: "1"
        run: make build-macos-x64

      - uses: actions/upload-artifact@v5
        with:
          name: macos-x64
          path: app/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify release version
        shell: bash
        run: bash .github/scripts/verify-release-version.sh

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runtime/go.sum

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        shell: bash
        run: cd app && npm ci

      - name: Build Windows x64
        shell: bash
        run: bash scripts/build-windows-app.sh

      - uses: actions/upload-artifact@v5
        with:
          name: windows-x64
          path: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Verify release version
        run: bash .github/scripts/verify-release-version.sh

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            libssl-dev

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: runtime/go.sum

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install frontend dependencies
        run: make install

      - name: Build Linux x64
        run: bash scripts/build-linux-app.sh

      - uses: actions/upload-artifact@v5
        with:
          name: linux-x64
          path: |
            app/src-tauri/target/release/bundle/deb/*.deb
            app/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  release:
    needs:
      - build-macos-arm64
      - build-macos-x64
      - build-windows
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release assets
        run: bash .github/scripts/prepare-release-assets.sh dist release

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Orbit ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
